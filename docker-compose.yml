version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finvantage-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: finvantage
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: finvantage-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
