service: finvantage

frameworkVersion: '3'
useDotenv: true # <--- ĐÃ THÊM: Bắt buộc phải có để AWS đọc được link Supabase và Upstash trong file .env

plugins:
  - serverless-offline

provider:
  name: aws
  runtime: nodejs20.x
  region: ap-southeast-1
  timeout: 30 # <--- ĐÃ THÊM: Kéo dài sự sống của hàm lên 30s để AI Bedrock có thời gian phân tích
  stage: ${opt:stage, 'dev'}
  environment:
    AWS_REGION_NAME: ${env:AWS_REGION_NAME, 'ap-southeast-1'}
    S3_RAW_BUCKET_NAME: ${env:S3_RAW_BUCKET_NAME, env:S3_BUCKET_NAME, 'finvantage-raw-invoices-dev'}
    S3_BUCKET_NAME: ${env:S3_BUCKET_NAME, env:S3_RAW_BUCKET_NAME, 'finvantage-raw-invoices-dev'}
    BEDROCK_MODEL_ID: ${env:BEDROCK_MODEL_ID, 'anthropic.claude-3-haiku-20240307-v1:0'}
    DB_HOST: ${env:DB_HOST, 'localhost'}
    DB_PORT: ${env:DB_PORT, '5432'}
    DB_NAME: ${env:DB_NAME, 'finvantage'}
    DB_USER: ${env:DB_USER, 'postgres'}
    DB_PASSWORD: ${env:DB_PASSWORD, 'postgres'}
    RDS_PROXY_ENDPOINT: ${env:RDS_PROXY_ENDPOINT, env:DB_HOST, 'localhost'}
    REDIS_URL: ${env:REDIS_URL, 'redis://localhost:6379'}
    USE_MOCK_AI: ${env:USE_MOCK_AI, 'true'}
    USE_MOCK_AUTH: ${env:USE_MOCK_AUTH, 'false'}
    COGNITO_USER_POOL_ID: ${env:COGNITO_USER_POOL_ID, 'ap-southeast-2_w5VOUmdXq'}
    COGNITO_CLIENT_ID: ${env:COGNITO_CLIENT_ID, '2hs9fmv5n769u1oit0022hisjf'}
    PROFILE_AVATAR_BUCKET_NAME: ${env:PROFILE_AVATAR_BUCKET_NAME, env:S3_RAW_BUCKET_NAME, env:S3_BUCKET_NAME, 'finvantage-raw-invoices-dev'}
    SNS_BUDGET_ALERTS_TOPIC_ARN: ${env:SNS_BUDGET_ALERTS_TOPIC_ARN, ''}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  iam:
    role:
      statements:
        # Cho phép đọc tệp từ S3 Raw Bucket
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - arn:aws:s3:::${env:S3_RAW_BUCKET_NAME, env:S3_BUCKET_NAME, 'finvantage-raw-invoices-dev'}/uploads/*
        - Effect: Allow
          Action:
            - s3:GetObject
            - s3:PutObject
          Resource:
            - arn:aws:s3:::${env:PROFILE_AVATAR_BUCKET_NAME, env:S3_RAW_BUCKET_NAME, env:S3_BUCKET_NAME, 'finvantage-raw-invoices-dev'}/avatars/*
        # Cho phép gọi API AnalyzeExpense của AWS Textract
        - Effect: Allow
          Action:
            - textract:AnalyzeExpense
          Resource:
            - "*"
        - Effect: Allow
          Action:
            - sns:Publish
          Resource: ${env:SNS_BUDGET_ALERTS_TOPIC_ARN, '*'}
        # Cho phép gọi AI Bedrock
        - Effect: Allow
          Action:
            - bedrock:InvokeModel
          Resource:
            - "*"

functions:
  importInvoice:
    handler: src/handlers/importHandler.handler
    description: "API nhận thông tin nhập hóa đơn ban đầu và chuẩn bị upload"
    events:
      - http:
          path: invoices/import
          method: post
          cors: true

  ocrInvoice:
    handler: src/handlers/ocrHandler.handler
    description: "Trigger từ S3 bucket khi có file hóa đơn mới upload lên để chạy OCR bằng AWS Textract"
    events:
      # S3 event trigger: Tự động kích hoạt khi có tệp được tải lên thư mục uploads/
      - s3:
          bucket: ${env:S3_RAW_BUCKET_NAME, env:S3_BUCKET_NAME, 'finvantage-raw-invoices-dev'}
          event: s3:ObjectCreated:*
          rules:
            - prefix: uploads/
          existing: true # Sử dụng nếu bucket đã tồn tại hoặc tự tạo

  analyzeInvoice:
    handler: src/handlers/analysisHandler.handler
    description: "API thực hiện phân tích hóa đơn đã trích xuất bằng Amazon Bedrock"
    events:
      - http:
          path: invoices/{id}/analyze
          method: post
          cors: true

  ocrInvoiceApi:
    handler: src/handlers/ocrApiHandler.handler
    description: "API chay OCR bang Amazon Textract cho file S3 da upload khi test local"
    events:
      - http:
          path: invoices/{id}/ocr
          method: post
          cors: true

  listInvoices:
    handler: src/handlers/invoiceHandler.listInvoices
    description: "API lấy danh sách hóa đơn đã phân tích theo user"
    events:
      - http:
          path: invoices
          method: get
          cors: true

  searchInvoices:
    handler: src/handlers/invoiceHandler.searchInvoices
    description: "Tim giao dich va line item theo Cognito sub"
    events:
      - http:
          path: search
          method: get
          cors: true

  getInvoice:
    handler: src/handlers/invoiceHandler.getInvoice
    events:
      - http:
          path: invoices/{id}
          method: get
          cors: true

  getInvoiceStatus:
    handler: src/handlers/invoiceHandler.getInvoiceStatus
    description: "Lấy trạng thái pipeline hóa đơn theo Cognito sub"
    events:
      - http:
          path: invoices/{id}/status
          method: get
          cors: true

  updateInvoice:
    handler: src/handlers/invoiceHandler.updateInvoice
    events:
      - http:
          path: invoices/{id}
          method: put
          cors: true

  deleteInvoice:
    handler: src/handlers/invoiceHandler.deleteInvoice
    events:
      - http:
          path: invoices/{id}
          method: delete
          cors: true

  budgetsApi:
    handler: src/handlers/budgetHandler.handler
    events:
      - http:
          path: budgets
          method: get
          cors: true
      - http:
          path: budgets
          method: post
          cors: true
      - http:
          path: budgets/{id}
          method: delete
          cors: true

  profileApi:
    handler: src/handlers/profileHandler.handler
    events:
      - http:
          path: me
          method: get
          cors: true
      - http:
          path: me
          method: put
          cors: true
      - http:
          path: me/preferences
          method: get
          cors: true
      - http:
          path: me/preferences
          method: put
          cors: true
      - http:
          path: me/avatar/upload-url
          method: post
          cors: true

  notificationsApi:
    handler: src/handlers/notificationHandler.handler
    events:
      - http:
          path: notifications
          method: get
          cors: true
      - http:
          path: notifications/unread-count
          method: get
          cors: true
      - http:
          path: notifications/{id}/read
          method: put
          cors: true
      - http:
          path: notifications/read-all
          method: put
          cors: true
      - http:
          path: notifications/{id}
          method: delete
          cors: true

  dashboardSummary:
    handler: src/handlers/invoiceHandler.dashboardSummary
    description: "API lấy tổng quan dashboard tài chính theo user"
    events:
      - http:
          path: dashboard-summary
          method: get
          cors: true

  paymentApi:
    handler: src/handlers/paymentHandler.handler
    description: "API xử lý thông tin thanh toán cho hóa đơn (phương thức giả lập)"
    events:
      - http:
          path: payment
          method: post
          cors: true
