service: finvantage

frameworkVersion: '4'
# Local dotenv loading is isolated to scripts/serverless-local.js. Production
# packaging never inherits a developer .env file implicitly.
useDotenv: false

plugins:
  - ./scripts/serverless-production-guard.cjs
  - serverless-offline

custom:
  runtimeConfig: ${file(./scripts/serverless-env.cjs):runtime}
  apiCors:
    origin: ${self:custom.runtimeConfig.apiAllowedOrigin}
    headers:
      - Accept
      - Authorization
      - Content-Type
      - Idempotency-Key
    allowCredentials: false
  backendEnvironment: &backendEnvironment
    S3_RAW_BUCKET_NAME: ${self:custom.runtimeConfig.s3RawBucketName}
    S3_BUCKET_NAME: ${self:custom.runtimeConfig.s3BucketName}
    PROFILE_AVATAR_BUCKET_NAME: ${self:custom.runtimeConfig.profileAvatarBucketName}
    DB_HOST: ${self:custom.runtimeConfig.dbHost}
    DB_PORT: ${self:custom.runtimeConfig.dbPort}
    DB_NAME: ${self:custom.runtimeConfig.dbName}
    DB_USER: ${self:custom.runtimeConfig.dbUser}
    DB_PASSWORD: ${self:custom.runtimeConfig.dbPassword}
    DB_SSL: ${self:custom.runtimeConfig.dbSsl}
    DB_SSL_CA_BASE64: ${self:custom.runtimeConfig.dbSslCaBase64}
    DB_POOL_MAX: ${self:custom.runtimeConfig.dbPoolMax}
    DB_CONNECTION_TIMEOUT_MS: ${self:custom.runtimeConfig.dbConnectionTimeoutMs}
    DB_IDLE_TIMEOUT_MS: ${self:custom.runtimeConfig.dbIdleTimeoutMs}
    DB_STATEMENT_TIMEOUT_MS: ${self:custom.runtimeConfig.dbStatementTimeoutMs}
    DB_IDLE_TRANSACTION_TIMEOUT_MS: ${self:custom.runtimeConfig.dbIdleTransactionTimeoutMs}
    NODE_EXTRA_CA_CERTS: ${self:custom.runtimeConfig.nodeExtraCaCerts}
    RDS_PROXY_ENDPOINT: ${self:custom.runtimeConfig.rdsProxyEndpoint}
    DB_SECRET_ARN: ${self:custom.runtimeConfig.dbSecretArn}
    DB_SECRET_REGION: ${self:custom.runtimeConfig.dbSecretRegion}
    REDIS_URL: ${self:custom.runtimeConfig.redisUrl}
    REDIS_KEY_PREFIX: ${self:custom.runtimeConfig.redisKeyPrefix}
    REDIS_CONNECT_TIMEOUT_MS: ${self:custom.runtimeConfig.redisConnectTimeoutMs}
    REDIS_COMMAND_TIMEOUT_MS: ${self:custom.runtimeConfig.redisCommandTimeoutMs}
    REDIS_MAX_RECONNECT_ATTEMPTS: ${self:custom.runtimeConfig.redisMaxReconnectAttempts}
    REDIS_RECONNECT_BASE_DELAY_MS: ${self:custom.runtimeConfig.redisReconnectBaseDelayMs}
    REDIS_RECONNECT_MAX_DELAY_MS: ${self:custom.runtimeConfig.redisReconnectMaxDelayMs}
    SNS_BUDGET_ALERTS_TOPIC_ARN: ${self:custom.runtimeConfig.snsTopicArn}
  analysisEnvironment:
    <<: *backendEnvironment
    USE_MOCK_AI: ${self:custom.runtimeConfig.useMockAi}
    BEDROCK_AWS_REGION: ${self:custom.runtimeConfig.bedrockAwsRegion}
    BEDROCK_MODEL_ID: ${self:custom.runtimeConfig.bedrockModelId}
    BEDROCK_ROLE_ARN: ${self:custom.runtimeConfig.bedrockRoleArn}
    BEDROCK_ROLE_SESSION_NAME: ${self:custom.runtimeConfig.bedrockRoleSessionName}
    BEDROCK_EXTERNAL_ID: ${self:custom.runtimeConfig.bedrockExternalId}
  authEnvironment:
    REDIS_URL: ${self:custom.runtimeConfig.redisUrl}
    AUTH_SESSION_REDIS_URL: ${self:custom.runtimeConfig.authSessionRedisUrl}
    REDIS_KEY_PREFIX: ${self:custom.runtimeConfig.redisKeyPrefix}
    REDIS_CONNECT_TIMEOUT_MS: ${self:custom.runtimeConfig.redisConnectTimeoutMs}
    REDIS_COMMAND_TIMEOUT_MS: ${self:custom.runtimeConfig.redisCommandTimeoutMs}
    REDIS_MAX_RECONNECT_ATTEMPTS: ${self:custom.runtimeConfig.redisMaxReconnectAttempts}
    REDIS_RECONNECT_BASE_DELAY_MS: ${self:custom.runtimeConfig.redisReconnectBaseDelayMs}
    REDIS_RECONNECT_MAX_DELAY_MS: ${self:custom.runtimeConfig.redisReconnectMaxDelayMs}
    AUTH_SESSION_TTL_SECONDS: ${self:custom.runtimeConfig.authSessionTtlSeconds}
    SESSION_SECRET: ${self:custom.runtimeConfig.sessionSecret}
    COGNITO_CLIENT_SECRET: ${self:custom.runtimeConfig.cognitoClientSecret}
    COGNITO_ISSUER: ${self:custom.runtimeConfig.cognitoIssuer}
    COGNITO_DOMAIN: ${self:custom.runtimeConfig.cognitoDomain}
    COGNITO_REDIRECT_URI: ${self:custom.runtimeConfig.cognitoRedirectUri}
    COGNITO_LOGOUT_URI: ${self:custom.runtimeConfig.cognitoLogoutUri}
    COGNITO_SCOPES: ${self:custom.runtimeConfig.cognitoScopes}
  serverless-offline:
    httpPort: 3000
    lambdaPort: 3002

package:
  individually: true
  excludeDevDependencies: true
  patterns:
    - '!node_modules/**'
    - '!frontend/**'
    - '!tests/**'
    - '!infra/**'
    - '!migrations/**'
    - '!scripts/**'
    - '!screenshots/**'
    - '!coverage/**'
    - '!docs/**'
    - '!*.md'
    - '!*.sql'
    - '!docker-compose.yml'
    - '!.env*'
    - '!.git/**'

build:
  esbuild:
    bundle: true
    minify: false
    sourcemap: false
    buildConcurrency: 3
    exclude: []
    banner:
      js: "import { createRequire } from 'node:module'; const require = createRequire(import.meta.url);"

provider:
  name: aws
  runtime: nodejs24.x
  region: ${self:custom.runtimeConfig.awsRegionName}
  timeout: 30
  stage: ${self:custom.runtimeConfig.stage}
  logRetentionInDays: ${self:custom.runtimeConfig.logRetentionDays}
  deploymentBucket:
    name: ${self:custom.runtimeConfig.serverlessDeploymentBucket}
  environment:
    NODE_ENV: ${self:custom.runtimeConfig.nodeEnv}
    APP_STAGE: ${self:custom.runtimeConfig.appStage}
    STAGE: ${self:custom.runtimeConfig.stage}
    AWS_REGION_NAME: ${self:custom.runtimeConfig.awsRegionName}
    USE_MOCK_AUTH: ${self:custom.runtimeConfig.useMockAuth}
    API_ALLOWED_ORIGIN: ${self:custom.runtimeConfig.apiAllowedOrigin}
    COGNITO_USER_POOL_ID: ${self:custom.runtimeConfig.cognitoUserPoolId}
    COGNITO_CLIENT_ID: ${self:custom.runtimeConfig.cognitoClientId}
    LOG_LEVEL: ${self:custom.runtimeConfig.logLevel}
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: '1'
  iam:
    role:
      statements: ${file(./scripts/serverless-env.cjs):iamStatements}

functions:
  authApi:
    handler: auth-server/lambda.handler
    environment: ${self:custom.authEnvironment}
    role:
      Fn::GetAtt:
        - AuthLambdaExecutionRole
        - Arn
    description: "Cognito authorization-code BFF with shared Redis sessions"
    events:
      - http:
          path: auth
          method: any
          cors: ${self:custom.apiCors}
      - http:
          path: auth/{proxy+}
          method: any
          cors: ${self:custom.apiCors}

  importInvoice:
    handler: src/handlers/importHandler.handler
    environment: ${self:custom.backendEnvironment}
    description: "API nhận thông tin nhập hóa đơn ban đầu và chuẩn bị upload"
    events:
      - http:
          path: invoices/import
          method: post
          cors: ${self:custom.apiCors}

  ocrInvoice:
    handler: src/handlers/ocrHandler.handler
    environment: ${self:custom.backendEnvironment}
    description: "Trigger từ S3 bucket khi có file hóa đơn mới upload lên để chạy OCR bằng AWS Textract"
    events:
      # S3 event trigger: Tự động kích hoạt khi có tệp được tải lên thư mục uploads/
      - s3:
          bucket: ${self:custom.runtimeConfig.s3RawBucketName}
          event: s3:ObjectCreated:*
          rules:
            - prefix: uploads/
          existing: true # Bucket phải tồn tại trước khi package/deploy production.

  analyzeInvoice:
    handler: src/handlers/analysisHandler.handler
    environment: ${self:custom.analysisEnvironment}
    role:
      Fn::GetAtt:
        - AnalysisLambdaExecutionRole
        - Arn
    description: "API thực hiện phân tích hóa đơn đã trích xuất bằng Amazon Bedrock"
    events:
      - http:
          path: invoices/{id}/analyze
          method: post
          cors: ${self:custom.apiCors}

  ocrInvoiceApi:
    handler: src/handlers/ocrApiHandler.handler
    environment: ${self:custom.backendEnvironment}
    description: "API chay OCR bang Amazon Textract cho file S3 da upload khi test local"
    events:
      - http:
          path: invoices/{id}/ocr
          method: post
          cors: ${self:custom.apiCors}

  listInvoices:
    handler: src/handlers/invoiceHandler.listInvoices
    environment: ${self:custom.backendEnvironment}
    description: "API lấy danh sách hóa đơn đã phân tích theo user"
    events:
      - http:
          path: invoices
          method: get
          cors: ${self:custom.apiCors}

  createInvoice:
    handler: src/handlers/invoiceHandler.createInvoice
    environment: ${self:custom.backendEnvironment}
    description: "API tạo giao dịch thủ công theo user"
    events:
      - http:
          path: invoices
          method: post
          cors: ${self:custom.apiCors}

  searchInvoices:
    handler: src/handlers/invoiceHandler.searchInvoices
    environment: ${self:custom.backendEnvironment}
    description: "Tim giao dich va line item theo Cognito sub"
    events:
      - http:
          path: search
          method: get
          cors: ${self:custom.apiCors}

  getInvoice:
    handler: src/handlers/invoiceHandler.getInvoice
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: invoices/{id}
          method: get
          cors: ${self:custom.apiCors}

  getInvoiceStatus:
    handler: src/handlers/invoiceHandler.getInvoiceStatus
    environment: ${self:custom.backendEnvironment}
    description: "Lấy trạng thái pipeline hóa đơn theo Cognito sub"
    events:
      - http:
          path: invoices/{id}/status
          method: get
          cors: ${self:custom.apiCors}

  updateInvoice:
    handler: src/handlers/invoiceHandler.updateInvoice
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: invoices/{id}
          method: put
          cors: ${self:custom.apiCors}

  deleteInvoice:
    handler: src/handlers/invoiceHandler.deleteInvoice
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: invoices/{id}
          method: delete
          cors: ${self:custom.apiCors}

  budgetsApi:
    handler: src/handlers/budgetHandler.handler
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: budgets
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: budgets
          method: post
          cors: ${self:custom.apiCors}
      - http:
          path: budgets/{id}
          method: delete
          cors: ${self:custom.apiCors}

  profileApi:
    handler: src/handlers/profileHandler.handler
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: me
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: me
          method: put
          cors: ${self:custom.apiCors}
      - http:
          path: me/preferences
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: me/preferences
          method: put
          cors: ${self:custom.apiCors}
      - http:
          path: me/avatar/upload-url
          method: post
          cors: ${self:custom.apiCors}

  notificationsApi:
    handler: src/handlers/notificationHandler.handler
    environment: ${self:custom.backendEnvironment}
    events:
      - http:
          path: notifications
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: notifications/unread-count
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: notifications/{id}/read
          method: put
          cors: ${self:custom.apiCors}
      - http:
          path: notifications/read-all
          method: put
          cors: ${self:custom.apiCors}
      - http:
          path: notifications/{id}
          method: delete
          cors: ${self:custom.apiCors}

  dashboardSummary:
    handler: src/handlers/invoiceHandler.dashboardSummary
    environment: ${self:custom.backendEnvironment}
    description: "API lấy tổng quan dashboard tài chính theo user"
    events:
      - http:
          path: dashboard-summary
          method: get
          cors: ${self:custom.apiCors}

  spendingPlanApi:
    handler: src/handlers/spendingPlanHandler.handler
    environment: ${self:custom.backendEnvironment}
    description: "API kế hoạch chi tiêu theo thu nhập tháng của người dùng"
    events:
      - http:
          path: spending-plan
          method: get
          cors: ${self:custom.apiCors}
      - http:
          path: spending-plan
          method: put
          cors: ${self:custom.apiCors}

  paymentApi:
    handler: src/handlers/paymentHandler.handler
    environment: ${self:custom.backendEnvironment}
    description: "API xử lý thông tin thanh toán cho hóa đơn (phương thức giả lập)"
    events:
      - http:
          path: payment
          method: post
          cors: ${self:custom.apiCors}

resources:
  Resources:
    AuthLambdaExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: auth-lambda-runtime
            PolicyDocument:
              Version: '2012-10-17'
              Statement: ${file(./scripts/serverless-env.cjs):authIamStatements}
    AnalysisLambdaExecutionRole:
      Type: AWS::IAM::Role
      Properties:
        AssumeRolePolicyDocument:
          Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Principal:
                Service: lambda.amazonaws.com
              Action: sts:AssumeRole
        Policies:
          - PolicyName: analysis-lambda-runtime
            PolicyDocument:
              Version: '2012-10-17'
              Statement: ${file(./scripts/serverless-env.cjs):analysisIamStatements}
    GatewayResponseDefault4XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseType: DEFAULT_4XX
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.runtimeConfig.apiAllowedOrigin}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Accept,Authorization,Content-Type,Idempotency-Key'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        ResponseTemplates:
          application/json: '{"code":"API_GATEWAY_ERROR","message":"Request could not be processed."}'
    GatewayResponseDefault5XX:
      Type: AWS::ApiGateway::GatewayResponse
      Properties:
        ResponseType: DEFAULT_5XX
        RestApiId:
          Ref: ApiGatewayRestApi
        ResponseParameters:
          gatewayresponse.header.Access-Control-Allow-Origin: "'${self:custom.runtimeConfig.apiAllowedOrigin}'"
          gatewayresponse.header.Access-Control-Allow-Headers: "'Accept,Authorization,Content-Type,Idempotency-Key'"
          gatewayresponse.header.Access-Control-Allow-Methods: "'GET,POST,PUT,PATCH,DELETE,OPTIONS'"
        ResponseTemplates:
          application/json: '{"code":"API_GATEWAY_ERROR","message":"Request could not be processed."}'
  Outputs:
    AnalysisLambdaExecutionRoleArn:
      Description: Source role ARN to allow in the cross-account Bedrock trust policy.
      Value:
        Fn::GetAtt:
          - AnalysisLambdaExecutionRole
          - Arn
